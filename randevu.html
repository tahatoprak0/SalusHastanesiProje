<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Randevu Al - Salus Hastanesi</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav>
        <div class="nav-container">
            <div class="logo">
                <img src="foto/ChatGPT Image 23 Nis 2026 17_05_33.png" alt="Salus Logo" class="logo-img">
                <span>SALUS HASTANESİ</span>
            </div>
            <div class="menu-links">
                <a href="index.html">Ana Sayfa</a>
                <a href="poliklinikler.html">Poliklinikler</a>
                <a href="doktorlar.html">Doktorlarımız</a>
                <a href="randevu.html">Randevu Al</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="appointment-header">

            <p>Lütfen bilgilerinizi eksiksiz girerek randevunuzu oluşturun.</p>
        </div>

        <div class="form-wrapper">
            <form action="#">
                <div class="form-group">
                    <label>TC Kimlik No</label>
                    <input type="text" placeholder="11 Haneli TC Numaranız" maxlength="11" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Poliklinik</label>
                        <select required>
                            <option value="">Bölüm Seçiniz</option>
                            <option>Göz Hastalıkları</option>
                            <option>Dahiliye</option>
                            <option>Kardiyoloji</option>
                            <option>Ortopedi</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Doktor</label>
                        <select required>
                            <option value="">Doktor Seçiniz</option>
                            <option>Dr. Ahmet Yılmaz</option>
                            <option>Dr. Ayşe Demir</option>
                            <option>Dr. Mehmet Kaya</option>
                            <option>Dr. Fatma Şahin</option>

                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Randevu Tarihi</label>
                        <input type="date" required>
                    </div>
                    <div class="form-group">
                        <label>Randevu Saati</label>
                        <input type="time" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Notunuz (Varsa Şikayetiniz)</label>
                    <textarea rows="4" placeholder="Kısaca belirtiniz..."></textarea>
                </div>

                <button type="submit" class="submit-btn">Randevuyu Tamamla</button>
            </form>
        </div>
    </div>

</body>

</html>
